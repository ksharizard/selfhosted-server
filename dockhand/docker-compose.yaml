services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand_data:/app/data
    labels:
      - "tsbridge.enabled=true"
      - "tsbridge.service.port=3000"

volumes:
  dockhand_data:
