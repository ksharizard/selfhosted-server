services:
  beets:
    image: lscr.io/linuxserver/beets:2.12.0
    container_name: beets
    user: 1000:1000
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=$TZ
    volumes:
      - ./config/beets:/config
      - ${MEDIA_DIRECTORY}/media/music:/music
      - ${MEDIA_DIRECTORY}/torrents/slskd/complete:/downloads
    restart: unless-stopped
