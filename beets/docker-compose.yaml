services:
  beets-flask:
    container_name: beets
    image: pspitzner/beets-flask:stable
    restart: unless-stopped
    environment:
      TZ: $TZ
      USER_ID: $PUID
      GROUP_ID: $PGID
    volumes:
      - ./config/beets-flask:/config
      - ${MEDIA_DIRECTORY}/media/music:/music
      - ${MEDIA_DIRECTORY}/torrents/slskd/complete:${MEDIA_DIRECTORY}/torrents/slskd/complete
    labels:
      caddy: beets.${MY_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 5001}}"
      caddy.import: tinyauth_forwarder *
