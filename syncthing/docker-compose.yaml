services:
  syncthing:
    container_name: syncthing
    image: lscr.io/linuxserver/syncthing:latest
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
    volumes:
      - ./config/syncthing:/config
      - ${DRIVE_DIRECTORY}/files:/data1
    ports:
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped
    labels:
      caddy: sync.${MY_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8384}}"
