services:
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.3.0
    init: true
    container_name: seerr
    env_file:
      - ../.env
    ports:
      - 5055:5055
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    volumes:
      - ./config/seerr:/app/config
    # healthcheck:
    #   test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
    #   start_period: 20s
    #   timeout: 3s
    #   interval: 15s
    #   retries: 3
    restart: unless-stopped
    labels:
      - "tsbridge.enabled=true"
      - "tsbridge.service.port=5055"
