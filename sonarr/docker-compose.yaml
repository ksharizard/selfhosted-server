services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_DIRECTORY}:/data
    restart: unless-stopped
    labels:
      tsbridge.enabled: true
      tsbridge.service.port: 8989

